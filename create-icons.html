<!DOCTYPE html>
<html>
<head>
    <title>PWA Icon Generator</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f0f0f0; }
        .icon { width: 192px; height: 192px; background: linear-gradient(135deg, #e50914, #dc2626); 
                border-radius: 20px; display: flex; align-items: center; justify-content: center; 
                font-size: 80px; color: white; margin: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .icon-container { display: flex; flex-wrap: wrap; }
    </style>
</head>
<body>
    <h1>CinemaHub PWA Icons</h1>
    <p>Right-click each icon and "Save image as" to create the icon files:</p>
    
    <div class="icon-container">
        <div class="icon" style="width: 72px; height: 72px; font-size: 30px;">🎬</div>
        <div class="icon" style="width: 96px; height: 96px; font-size: 40px;">🎬</div>
        <div class="icon" style="width: 128px; height: 128px; font-size: 50px;">🎬</div>
        <div class="icon" style="width: 144px; height: 144px; font-size: 60px;">🎬</div>
        <div class="icon" style="width: 152px; height: 152px; font-size: 65px;">🎬</div>
        <div class="icon" style="width: 192px; height: 192px; font-size: 80px;">🎬</div>
        <div class="icon" style="width: 384px; height: 384px; font-size: 160px;">🎬</div>
        <div class="icon" style="width: 512px; height: 512px; font-size: 220px;">🎬</div>
    </div>
    
    <h2>Instructions:</h2>
    <ol>
        <li>Right-click each icon above</li>
        <li>Select "Save image as"</li>
        <li>Save as: icon-72x72.png, icon-96x96.png, etc.</li>
        <li>Place all files in the /icons/ folder</li>
    </ol>
</body>
</html>
